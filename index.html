<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Test — Supabase Auth</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; }
    .status { font-weight: 600; margin: 1rem 0; padding: 0.5rem; background: #f0f0f0; border-radius: 4px; }
    .status.logged-in { background: #e0f0e0; }
    form { margin: 1rem 0; }
    label { display: block; margin-top: 0.5rem; }
    input { width: 100%; padding: 0.5rem; margin-top: 0.25rem; box-sizing: border-box; }
    button { margin-top: 0.5rem; padding: 0.5rem 1rem; cursor: pointer; }
    .error { color: #c00; font-size: 0.9rem; margin-top: 0.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>Login Test</h1>
  <p id="statusMessage" class="status">Checking…</p>

  <div id="loggedOutView">
    <h2>Sign up</h2>
    <form id="signUpForm">
      <label>Email <input type="email" id="signUpEmail" required autocomplete="email"></label>
      <label>Password <input type="password" id="signUpPassword" required autocomplete="new-password" minlength="6"></label>
      <button type="submit">Sign up</button>
      <p id="signUpError" class="error hidden"></p>
      <p id="signUpSuccess" class="hidden" style="margin-top: 0.5rem; color: #0a0; font-size: 0.9rem;">Check your email to verify your account. Then sign in below.</p>
    </form>

    <h2>Sign in</h2>
    <form id="signInForm">
      <label>Email <input type="email" id="signInEmail" required autocomplete="email"></label>
      <label>Password <input type="password" id="signInPassword" required autocomplete="current-password"></label>
      <button type="submit">Sign in</button>
      <p id="signInError" class="error hidden"></p>
    </form>

    <p><button type="button" id="googleSignIn">Sign in with Google</button></p>
  </div>

  <div id="loggedInView" class="hidden">
    <button type="button" id="signOutBtn">Sign out</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Supabase Project URL and anon (public) key from Dashboard → Project Settings → API
    const SUPABASE_URL = 'https://azuldwtsumkbdbfqrgat.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_rdWi6HvlCNTyCKNfuWArBA_wDISjY4M';

    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const statusEl = document.getElementById('statusMessage');
    const loggedOutView = document.getElementById('loggedOutView');
    const loggedInView = document.getElementById('loggedInView');
    const signUpForm = document.getElementById('signUpForm');
    const signInForm = document.getElementById('signInForm');
    const signUpError = document.getElementById('signUpError');
    const signInError = document.getElementById('signInError');
    const signUpSuccess = document.getElementById('signUpSuccess');

    function showError(el, message) {
      el.textContent = message || '';
      el.classList.toggle('hidden', !message);
    }

    function updateUI(session) {
      const loggedIn = !!session;
      statusEl.textContent = loggedIn ? 'Hey you are logged in!' : 'You are not logged in!';
      statusEl.classList.toggle('logged-in', loggedIn);
      loggedOutView.classList.toggle('hidden', loggedIn);
      loggedInView.classList.toggle('hidden', !loggedIn);
      showError(signUpError, '');
      showError(signInError, '');
      if (signUpSuccess) signUpSuccess.classList.add('hidden');
    }

    async function init() {
      if (!SUPABASE_URL || SUPABASE_URL === 'YOUR_SUPABASE_URL' || !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY === 'YOUR_SUPABASE_ANON_KEY') {
        statusEl.textContent = 'Configure SUPABASE_URL and SUPABASE_ANON_KEY in index.html';
        loggedOutView.classList.add('hidden');
        return;
      }
      const { data: { session } } = await supabaseClient.auth.getSession();
      updateUI(session);
    }

    supabaseClient.auth.onAuthStateChange((event, session) => {
      updateUI(session);
    });

    signUpForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      showError(signUpError, '');
      if (signUpSuccess) signUpSuccess.classList.add('hidden');
      const email = document.getElementById('signUpEmail').value.trim();
      const password = document.getElementById('signUpPassword').value;
      const { data, error } = await supabaseClient.auth.signUp({ email, password });
      if (error) {
        showError(signUpError, error.message);
        return;
      }
      showError(signUpError, '');
      if (data.user && !data.session && signUpSuccess) {
        signUpSuccess.classList.remove('hidden');
      }
    });

    signInForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      showError(signInError, '');
      const email = document.getElementById('signInEmail').value.trim();
      const password = document.getElementById('signInPassword').value;
      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        showError(signInError, error.message);
        return;
      }
      showError(signInError, '');
    });

    document.getElementById('googleSignIn').addEventListener('click', async () => {
      await supabaseClient.auth.signInWithOAuth({ provider: 'google' });
    });

    document.getElementById('signOutBtn').addEventListener('click', async () => {
      await supabaseClient.auth.signOut();
    });

    init();
  </script>
</body>
</html>
